server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 大文件上传：避免 413 Request Entity Too Large（nginx 默认 1MB）
    client_max_body_size 500m;

    # 启用 gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;

    # 静态资源缓存
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA 路由支持 - 所有路由都返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # API 代理：将 /api 请求转发到后端服务（启用时请将 proxy_pass 改为实际后端地址）
    # location /api/ {
    #     proxy_pass https://your-backend-host.com/;
    #
    #     # 大文件上传必须设置，否则会 413 Request Entity Too Large（与 server 级 500m 一致）
    #     client_max_body_size 500m;
    #
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_set_header X-Forwarded-Host $host;
    #
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #
    #     # 大文件上传与长任务需更长超时
    #     proxy_connect_timeout 60s;
    #     proxy_send_timeout 300s;
    #     proxy_read_timeout 300s;
    #
    #     proxy_buffering off;
    #     proxy_request_buffering off;
    # }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 错误页面
    error_page 404 /index.html;
}

